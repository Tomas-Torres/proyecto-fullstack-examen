server:
  port: 8083

spring:
  application:
    name: ms-pelicula

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/cine_catalogo?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

# Configuración de Swagger
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

# Conexión al registro de Eureka
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/

logging:
  level:
    com.cine.pelicula: DEBUG