version: '3.8'

services:

  mysql-usuario:
    image: mysql:8.0
    container_name: mysql-usuario
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cine_usuarios
    ports:
      - "3308:3306"
    volumes:
      - mysql_usuario_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  ms-usuario:
    build: .
    container_name: ms-usuario
    ports:
      - "8081:8081"
    environment:
      SPRING_APPLICATION_NAME: ms-usuarios
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-usuario:3306/cine_usuarios?createDatabaseIfNotExist=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_FLYWAY_ENABLED: "false"
    depends_on:
      mysql-usuario:
        condition: service_healthy

volumes:
  mysql_usuario_data: